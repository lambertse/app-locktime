syntax = "proto3";
package locktime.rpc;

// ─── Core Types ───────────────────────────────────────────────────────────────

message Schedule {
  string id               = 1;
  string rule_id          = 2;
  repeated int32 days     = 3;  // 0=Sunday..6=Saturday
  string allow_start      = 4;  // "HH:MM" 24h
  string allow_end        = 5;  // "HH:MM" 24h
  int32 warn_before_minutes = 6;
}

message Rule {
  string id                  = 1;
  string name                = 2;
  string exe_name            = 3;
  string exe_path            = 4;  // empty string if not set
  string match_mode          = 5;  // "name" | "path"
  bool   enabled             = 6;
  int32  daily_limit_minutes = 7;
  repeated Schedule schedules = 8;
  string created_at          = 9;
  string updated_at          = 10;
}

message RuleStatusEntry {
  string rule_id         = 1;
  string rule_name       = 2;
  string exe_name        = 3;
  bool   enabled         = 4;
  string status          = 5;  // "locked" | "active" | "disabled"
  string reason          = 6;  // "outside_schedule" | "daily_limit_reached" | "both" | ""
  string blocked_since   = 7;
  string next_lock_at    = 8;
  string next_unlock_at  = 9;
  bool   currently_running = 10;
  int32  pid             = 11;
  string session_started = 12;
  int32  minutes_elapsed = 13;
}

message ServiceInfo {
  string status         = 1;
  string version        = 2;
  int64  uptime_seconds = 3;
  bool   time_synced    = 4;
  int64  ntp_offset_ms  = 5;
}

message Override {
  string rule_id          = 1;
  string granted_at       = 2;
  string expires_at       = 3;
  int32  duration_minutes = 4;
  string reason           = 5;
}

// ─── Status ───────────────────────────────────────────────────────────────────

message GetStatusRequest {}

message GetStatusResponse {
  ServiceInfo            service = 1;
  repeated RuleStatusEntry rules = 2;
}

// ─── Rules ────────────────────────────────────────────────────────────────────

message ListRulesRequest {}
message ListRulesResponse { repeated Rule rules = 1; }

message GetRuleRequest  { string id = 1; }
message GetRuleResponse { Rule rule = 1; }

message SchedulePayload {
  repeated int32 days     = 1;
  string allow_start      = 2;
  string allow_end        = 3;
  int32 warn_before_minutes = 4;
}

message CreateRuleRequest {
  string name                   = 1;
  string exe_name               = 2;
  string exe_path               = 3;
  string match_mode             = 4;
  bool   enabled                = 5;
  int32  daily_limit_minutes    = 6;
  repeated SchedulePayload schedules = 7;
}
message CreateRuleResponse { Rule rule = 1; }

message UpdateRuleRequest {
  string id                     = 1;
  string name                   = 2;
  string exe_name               = 3;
  string exe_path               = 4;
  string match_mode             = 5;
  bool   enabled                = 6;
  int32  daily_limit_minutes    = 7;
  repeated SchedulePayload schedules = 8;
}
message UpdateRuleResponse { Rule rule = 1; }

message PatchRuleRequest {
  string id         = 1;
  bool   has_enabled = 2;
  bool   enabled    = 3;
  bool   has_name   = 4;
  string name       = 5;
}
message PatchRuleResponse { Rule rule = 1; }

message DeleteRuleRequest  { string id = 1; }
message DeleteRuleResponse {}

// ─── Overrides ────────────────────────────────────────────────────────────────

message GrantOverrideRequest {
  string rule_id          = 1;
  int32  duration_minutes = 2;
  string reason           = 3;
}
message GrantOverrideResponse { Override override_info = 1; }

message RevokeOverrideRequest  { string rule_id = 1; }
message RevokeOverrideResponse { bool revoked = 1; }

// ─── Usage ────────────────────────────────────────────────────────────────────

message UsageSessionEntry {
  string started_at       = 1;
  string ended_at         = 2;
  int32  duration_minutes = 3;
}

message UsageEntry {
  string rule_id              = 1;
  string rule_name            = 2;
  string exe_name             = 3;
  int32  minutes_used         = 4;
  int32  daily_limit_minutes  = 5;
  int32  minutes_remaining    = 6;
  bool   limit_reached        = 7;
  repeated UsageSessionEntry sessions = 8;
}

message GetUsageTodayRequest {}
message GetUsageTodayResponse {
  string date = 1;
  repeated UsageEntry usage = 2;
}

message DailyBreakdown {
  string date         = 1;
  int32  minutes_used = 2;
}

message ByRuleEntry {
  string rule_id      = 1;
  string rule_name    = 2;
  int32  total_minutes = 3;
  repeated DailyBreakdown daily_breakdown = 4;
}

message ByDayRuleEntry {
  string rule_id     = 1;
  string rule_name   = 2;
  int32  minutes_used = 3;
}

message ByDayEntry {
  string date          = 1;
  int32  total_minutes = 2;
  repeated ByDayRuleEntry rules = 3;
}

message GetUsageWeekRequest {}
message GetUsageWeekResponse {
  string range = 1;
  string from  = 2;
  string to    = 3;
  repeated ByRuleEntry by_rule = 4;
  repeated ByDayEntry  by_day  = 5;
}

message BlockAttempt {
  string id           = 1;
  string rule_id      = 2;
  string rule_name    = 3;
  string exe_path     = 4;
  string reason       = 5;
  string attempted_at = 6;
}

message GetBlockAttemptsRequest {
  string range   = 1;
  string rule_id = 2;
  int32  limit   = 3;
}
message GetBlockAttemptsResponse {
  string from  = 1;
  string to    = 2;
  int32  total = 3;
  repeated BlockAttempt attempts = 4;
}

// ─── System ───────────────────────────────────────────────────────────────────

message ProcessInfo {
  int32  pid       = 1;
  string name      = 2;
  string full_path = 3;
}

message GetProcessesRequest {}
message GetProcessesResponse { repeated ProcessInfo processes = 1; }

// ─── Config ───────────────────────────────────────────────────────────────────

message GetConfigRequest {}
message GetConfigResponse { map<string, string> config = 1; }

message UpdateConfigRequest { map<string, string> config = 1; }
message UpdateConfigResponse { map<string, string> config = 1; }

// ─── Check (for blocker.exe) ──────────────────────────────────────────────────

message CheckAppRequest  { string exe_path = 1; }
message CheckAppResponse {
  bool   allowed       = 1;
  string rule_id       = 2;
  string rule_name     = 3;
  string reason        = 4;
  string next_unlock_at = 5;
}

// ─── Service Definition ───────────────────────────────────────────────────────

service LockTimeService {
  rpc GetStatus      (GetStatusRequest)       returns (GetStatusResponse);
  rpc ListRules      (ListRulesRequest)       returns (ListRulesResponse);
  rpc GetRule        (GetRuleRequest)         returns (GetRuleResponse);
  rpc CreateRule     (CreateRuleRequest)      returns (CreateRuleResponse);
  rpc UpdateRule     (UpdateRuleRequest)      returns (UpdateRuleResponse);
  rpc PatchRule      (PatchRuleRequest)       returns (PatchRuleResponse);
  rpc DeleteRule     (DeleteRuleRequest)      returns (DeleteRuleResponse);
  rpc GrantOverride  (GrantOverrideRequest)   returns (GrantOverrideResponse);
  rpc RevokeOverride (RevokeOverrideRequest)  returns (RevokeOverrideResponse);
  rpc GetUsageToday  (GetUsageTodayRequest)   returns (GetUsageTodayResponse);
  rpc GetUsageWeek   (GetUsageWeekRequest)    returns (GetUsageWeekResponse);
  rpc GetBlockAttempts(GetBlockAttemptsRequest) returns (GetBlockAttemptsResponse);
  rpc GetProcesses   (GetProcessesRequest)    returns (GetProcessesResponse);
  rpc GetConfig      (GetConfigRequest)       returns (GetConfigResponse);
  rpc UpdateConfig   (UpdateConfigRequest)    returns (UpdateConfigResponse);
  rpc CheckApp       (CheckAppRequest)        returns (CheckAppResponse);
}
